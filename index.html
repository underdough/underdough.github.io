<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Un recordatorio diario, con amor, para Sol." />
  <meta name="theme-color" content="#5c1a2b" />
  <title>Para ti, Sol ✿</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="components/styles.css" />
</head>
<body>

  <!-- Nombre de Sol como marca de agua -->
  <div class="fondo-sol" aria-hidden="true">
    <span>Sol</span>
  </div>

  <!-- Capa de partículas (pétalos) generada por tsParticles -->
  <div id="tsparticles" aria-hidden="true"></div>

  <!-- Flores de loto decorativas en SVG -->
  <div class="loto-container" aria-hidden="true">
    <svg class="loto" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="lotoGrad" cx="50%" cy="60%" r="50%">
          <stop offset="0%"   stop-color="#fce4ec" stop-opacity="0.9" />
          <stop offset="60%"  stop-color="#e88fa3" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#5c1a2b" stop-opacity="0.5" />
        </radialGradient>
      </defs>
      <use href="#loto-base" />
    </svg>

    <!-- Plantilla reusable del loto (8 pétalos radiales) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <symbol id="loto-base" viewBox="0 0 100 100">
        <g transform="translate(50 55)">
          <g fill="url(#lotoGrad)" stroke="#f7c9d3" stroke-width="0.5" stroke-opacity="0.6">
            <ellipse cx="0" cy="-25" rx="10" ry="25" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(45)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(90)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(135)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(180)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(225)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(270)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(315)" />
          </g>
          <circle r="7" fill="#d4af7a" opacity="0.9" />
          <circle r="3" fill="#fce4ec" />
        </g>
      </symbol>
    </svg>

    <!-- El resto de los lotos se clonan desde el símbolo anterior -->
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
  </div>

  <!-- Contenido principal -->
  <main>
    <header>
      <h1 class="saludo">Buenos días, Sol <span class="corazon" aria-hidden="true">♥</span></h1>
      <p class="fecha" id="fecha"></p>
    </header>

    <article class="tarjeta" aria-live="polite">
      <p class="etiqueta">Tu recordatorio de hoy</p>

      <blockquote class="frase" id="frase">Cargando palabras para ti…</blockquote>
      <p class="autor" id="autor"></p>

      <p class="firma">— con todo mi amor</p>

      <div class="controles">
        <button id="btn-nueva" type="button">Otra frase ✿</button>
        <button id="btn-hoy"   type="button">La de hoy</button>
      </div>
    </article>

    <!-- Reproductor de Spotify -->
    <section class="musica" aria-label="Banda sonora para Sol">
      <p class="etiqueta">Nuestra banda sonora ♪</p>

      <!-- Lista de canciones (se rellena desde canciones.js) -->
      <ul class="lista-canciones" id="lista-canciones"></ul>

      <!-- El embed de Spotify vive aquí -->
      <div class="spotify-wrapper">
        <div id="spotify-embed"></div>
      </div>
    </section>
  </main>

  <footer>
    Hecho con <span>♥</span> solo para ti, mi <span>Sol</span>.
  </footer>

  <!-- Librerías externas -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"
    defer
  ></script>
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>

  <!-- Código de la app -->
  <script src="front/frases.js"    defer></script>
  <script src="front/canciones.js" defer></script>
  <script src="front/player.js"    defer></script>
  <script src="front/app.js"       defer></script>
</body>
</html>
