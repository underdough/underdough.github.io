<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Un recordatorio diario, con amor, para Sol." />
  <meta name="theme-color" content="#5c1a2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Para Sol" />
  <title>Para ti, Sol</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet"
  />

</head>
<body>

  <div class="fondo-sol" aria-hidden="true"><span>Sol</span></div>

  <div id="tsparticles" aria-hidden="true"></div>

  <div class="loto-container" aria-hidden="true">
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <radialGradient id="lotoGrad" cx="50%" cy="60%" r="50%">
          <stop offset="0%"   stop-color="#fce4ec" stop-opacity="0.9" />
          <stop offset="60%"  stop-color="#e88fa3" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#5c1a2b" stop-opacity="0.5" />
        </radialGradient>
      </defs>
      <symbol id="loto-base" viewBox="0 0 100 100">
        <g transform="translate(50 55)">
          <g fill="url(#lotoGrad)" stroke="#f7c9d3" stroke-width="0.5" stroke-opacity="0.6">
            <ellipse cx="0" cy="-25" rx="10" ry="25" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(45)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(90)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(135)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(180)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(225)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(270)" />
            <ellipse cx="0" cy="-25" rx="10" ry="25" transform="rotate(315)" />
          </g>
          <circle r="7" fill="#d4af7a" opacity="0.9" />
          <circle r="3" fill="#fce4ec" />
        </g>
      </symbol>
    </svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
    <svg class="loto" viewBox="0 0 100 100"><use href="#loto-base" /></svg>
  </div>

  <main>
    <header>
      <h1 class="saludo">Buenos d&iacute;as, Sol <span class="corazon" aria-hidden="true">&#9829;</span></h1>
      <p class="fecha" id="fecha"></p>
    </header>

    <article class="tarjeta" aria-live="polite">
      <div class="pestanas" role="tablist" aria-label="Tipo de frase">
        <button id="tab-motiv" class="pestana activa" role="tab" aria-selected="true" aria-controls="panel-frase" data-tipo="motivacional" type="button">.✦ ݁˖ ;  Motivaci&oacute;n</button>
        <button id="tab-romant" class="pestana" role="tab" aria-selected="false" aria-controls="panel-frase" data-tipo="romantica" type="button">&#9829; Para ti</button>
      </div>

      <div id="panel-frase" role="tabpanel" aria-labelledby="tab-motiv">
        <p class="etiqueta" id="etiqueta-tipo">Tu motivaci&oacute;n de hoy</p>
        <blockquote class="frase" id="frase">Cargando palabras para ti&hellip;</blockquote>
        <p class="autor" id="autor"></p>
        <p class="firma">&mdash; con todo mi corazón</p>
        <div class="controles">
          <button id="btn-nueva" type="button">Dale aquí para otra frase</button>
          <button id="btn-hoy" type="button">La frase de hoy</button>
        </div>
      </div>
    </article>

    <section class="musica" aria-label="Banda sonora para Sol">
      <p class="etiqueta">Nuestra banda sonora &#9834;</p>

      <ul class="lista-canciones" id="lista-canciones"></ul>

      <div class="yt-wrapper">
        <div class="yt-video" id="yt-video-wrapper">
          <div id="yt-player"></div>
        </div>

        <div class="yt-controles" aria-label="Controles de m&uacute;sica">
          <div class="yt-info">
            <span class="yt-titulo" id="yt-titulo">&mdash;</span>
            <span class="yt-tiempo" id="yt-tiempo">0:00 / 0:00</span>
          </div>

          <div class="yt-barra">
            <input id="yt-progreso" class="yt-slider" type="range" min="0" max="100" value="0" step="0.1" aria-label="Progreso de la canci&oacute;n" />
          </div>

          <div class="yt-botones">
            <button id="yt-prev" type="button" aria-label="Canci&oacute;n anterior">&#9198;</button>
            <button id="yt-play" type="button" aria-label="Reproducir o pausar" class="principal">&#9654;</button>
            <button id="yt-next" type="button" aria-label="Canci&oacute;n siguiente">&#9197;</button>

            <label class="yt-volumen">
              <span aria-hidden="true">&#9834;</span>
              <input id="yt-vol" class="yt-slider yt-slider--volumen" type="range" min="0" max="100" value="60" aria-label="Volumen" />
            </label>

            <button id="yt-toggle-video" type="button" class="secundario" aria-pressed="false">Mostrar v&iacute;deo</button>
          </div>
        </div>
      </div>

      <p class="aviso">Haz clic en una canci&oacute;n o en play para empezar a escuchar.</p>
    </section>

    <section class="galeria" aria-label="Nuestros recuerdos">
      <p class="etiqueta">Nuestros detalles bonitos &hearts;</p>
      <div class="galeria-grid" id="galeria-grid">
        <figure class="galeria-item">
          <img src="media/IMG_20260413_013807_773.jpg" alt="Recuerdo" loading="lazy" />
        </figure>
        <figure class="galeria-item">
          <img src="media/IMG_20260424_010333_460.jpg" alt="Recuerdo" loading="lazy" />
        </figure>
        <figure class="galeria-item">
          <img src="media/IMG_20260424_010353_426.jpg" alt="Recuerdo" loading="lazy" />
        </figure>
        <figure class="galeria-item">
          <img src="media/sunset_sol.jpg" alt="Recuerdo" loading="lazy" />
        </figure>
        <figure class="galeria-item galeria-item--video">
          <video src="media/picinic.mp4" playsinline muted loop preload="metadata"></video>
          <div class="galeria-play-icon" aria-hidden="true">&#9654;</div>
        </figure>
      </div>
    </section>
  </main>

  <footer>
    Hecho con <span>&#9829;</span> solo para ti, mi <span>Sol</span>.
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js" defer></script>
  
  <script src="front/frases.js"></script>
  <script src="front/canciones.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="front/player.js"></script>
  <script src="front/app.js"></script>
  <script src="widgets/widget-ios-scripteable.js"></script>

  <script>
    // Registrar Service Worker para PWA con auto-update.
    if ('serviceWorker' in navigator) {
      let recargando = false;

      // Cuando el SW nuevo toma control, recargamos una sola vez
      // para que el usuario vea enseguida los cambios.
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (recargando) return;
        recargando = true;
        window.location.reload();
      });

      // El SW tambien nos avisa cuando se activa.
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'SW_ACTIVATED') {
          console.log('[PWA] SW activado:', e.data.cache);
        }
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { updateViaCache: 'none' })
          .then((registration) => {
            console.log('[PWA] Service Worker registrado:', registration.scope);

            // Busca updates al entrar y cada vez que la pestana vuelve a foco.
            registration.update();
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') registration.update();
            });

            // Si aparece un SW nuevo esperando, lo activamos ya.
            registration.addEventListener('updatefound', () => {
              const nuevo = registration.installing;
              if (!nuevo) return;
              nuevo.addEventListener('statechange', () => {
                if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
                  nuevo.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch((error) => {
            console.log('[PWA] Error al registrar Service Worker:', error);
          });
      });
    }
  </script>

</body>
</html>
